<!doctype html>
<html lang="th">
<head>
<meta charset="utf-8" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Prompt:wght@500;600;700&display=swap" rel="stylesheet" />
<style>
  /* LINE rich menu — large canvas 2500 x 1686, 3 cols x 2 rows.
     Bold "full-tile" coloured cards: white icon + label, soft coloured glow. */
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{width:2500px;height:1686px;}
  body{font-family:'Prompt',sans-serif;background:#f5f7fb;-webkit-font-smoothing:antialiased;}
  .grid{
    width:2500px;height:1686px;display:grid;
    grid-template-columns:repeat(3,1fr);grid-template-rows:repeat(2,1fr);
    gap:30px;padding:30px;
  }
  .card{
    position:relative;border-radius:48px;overflow:hidden;color:#fff;
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:46px;
    background:var(--bg);box-shadow:0 30px 56px -20px var(--sh), inset 0 2px 0 rgba(255,255,255,.25);
  }
  /* single-direction sheen for dimension (top highlight → subtle bottom shade) */
  .card::before{
    content:"";position:absolute;inset:0;
    background:linear-gradient(180deg,rgba(255,255,255,.20) 0%,rgba(255,255,255,0) 40%,rgba(0,0,0,.10) 100%);
  }
  .ic{
    width:238px;height:238px;border-radius:64px;
    background:rgba(255,255,255,.20);display:grid;place-items:center;
    position:relative;box-shadow:inset 0 2px 0 rgba(255,255,255,.3);
  }
  .ic svg{width:124px;height:124px;fill:none;stroke:#fff;stroke-width:2.05;stroke-linecap:round;stroke-linejoin:round;}
  .lb{position:relative;font-size:82px;font-weight:600;letter-spacing:-.01em;text-shadow:0 2px 8px rgba(0,0,0,.12);}

  .blue  {--bg:#3c8cf3;--sh:rgba(60,140,243,.55);}
  .purple{--bg:#7459f2;--sh:rgba(116,89,242,.55);}
  .green {--bg:#08bd8c;--sh:rgba(8,189,140,.55);}
  .orange{--bg:#f5933a;--sh:rgba(245,147,58,.55);}
  .teal  {--bg:#10a9bd;--sh:rgba(16,169,189,.55);}
  .rose  {--bg:#f2647a;--sh:rgba(242,100,122,.55);}
</style>
</head>
<body>
  <div class="grid">
    <!-- 1 ลางาน -->
    <div class="card blue">
      <div class="ic"><svg viewBox="0 0 24 24"><rect x="3" y="4.5" width="18" height="16" rx="2.5"/><path d="M3 9h18M8 2.5v4M16 2.5v4"/><path d="M8.4 14.6l2.3 2.3 4.5-4.8"/></svg></div>
      <div class="lb">ลางาน</div>
    </div>
    <!-- 2 ขอ OT -->
    <div class="card purple">
      <div class="ic"><svg viewBox="0 0 24 24"><circle cx="12" cy="12.5" r="8"/><path d="M12 8.5v4.2l2.8 1.8M4.5 4 2.6 5.9M19.5 4l1.9 1.9"/></svg></div>
      <div class="lb">ขอ OT</div>
    </div>
    <!-- 3 ลงเวลา -->
    <div class="card green">
      <div class="ic"><svg viewBox="0 0 24 24"><path d="M21 5.5 10 16.5l-4-4"/><path d="M21 12a9 9 0 1 1-5.2-8.2"/></svg></div>
      <div class="lb">ลงเวลา</div>
    </div>
    <!-- 4 ขอเอกสาร -->
    <div class="card orange">
      <div class="ic"><svg viewBox="0 0 24 24"><path d="M14 3H7a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V8z"/><path d="M14 3v5h5M9 13h6M9 17h5"/></svg></div>
      <div class="lb">ขอเอกสาร</div>
    </div>
    <!-- 5 สถานะคำขอ -->
    <div class="card teal">
      <div class="ic"><svg viewBox="0 0 24 24"><path d="M10 6h10M10 12h10M10 18h10"/><path d="M3.5 5.5 5 7l2-2.5M3.5 11.5 5 13l2-2.5M4 18h.01"/></svg></div>
      <div class="lb">สถานะคำขอ</div>
    </div>
    <!-- 6 ติดต่อ HR -->
    <div class="card rose">
      <div class="ic"><svg viewBox="0 0 24 24"><path d="M5 12a7 7 0 0 1 14 0"/><rect x="3.5" y="12" width="4.5" height="7.5" rx="1.8"/><rect x="16" y="12" width="4.5" height="7.5" rx="1.8"/><path d="M19 19.5a3 3 0 0 1-3 3h-2.5"/></svg></div>
      <div class="lb">ติดต่อ HR</div>
    </div>
  </div>
</body>
</html>
